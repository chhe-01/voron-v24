## BOARD PINS
[board_pins EBB36_G0B1_v1.2] 
mcu: can0
aliases:
aliases_step:
    EXT_EN=PD2,EXT_STEP=PD0,EXT_DIR=PD1,EXT_UART=PA15
aliases_limitsw: # these are preferred for endstops (including klicky)
    #LIMIT_1=PB7,
    LIMIT_2=PB5,LIMIT_3=PB6
aliases_bltouch: # these are the dupont connectors for bltouch
    PROBE_1=PB9,PROBE_2=PB8
aliases_fans:
    FAN0=PA1,FAN1=PA0
aliases_thermistors:
    TH0=PA3,PT100_CS=PA4,PT100_SCLK=PA5,PT100_MISO=PA6,PT100_MOSI=PA7
aliases_heaters:
    HE0=PB13
aliases_rgb:
    RGBLED=PD3
aliases_adxl:
    ADXL_CS=PB12,ADXL_SCLK=PB10,ADXL_MISO=PB2,ADXL_MOSI=PB11
aliases_i2c:
    AUX0=PB3,AUX1=PB4


[mcu can0]
canbus_uuid: 6cb529c8ae5b # ebb36 v1.2 G0B1

[temperature_sensor ebb36]
sensor_type: temperature_mcu
sensor_mcu: can0

[heater_fan hotend_fan]
pin: can0:FAN1
max_power: 1.0
kick_start_time: 0.5
heater: extruder
heater_temp: 50.0
tachometer_pin: ^can0:PB9
tachometer_ppr: 2
tachometer_poll_interval: 0.0009

[fan]
pin: can0:FAN0
kick_start_time: 0.25
cycle_time: 0.15

[extruder]
step_pin: can0:EXT_STEP
dir_pin: can0:EXT_DIR
enable_pin: !can0:EXT_EN
full_steps_per_rotation: 200	#200 for 1.8 degree, 400 for 0.9 degree
rotation_distance: 47.5023      #47.088 alter Wert
gear_ratio: 9:1
microsteps: 16
nozzle_diameter: 0.500
filament_diameter: 1.75
max_extrude_cross_section: 5
heater_pin: can0:HE0
min_temp: 10
max_temp: 280
max_power: 1.0
min_extrude_temp: 180
max_extrude_only_distance: 1400.0
max_extrude_only_velocity: 75.0
max_extrude_only_accel: 1500
pressure_advance: 0.0                       # wird bei jedem Filament von OrcaSlicer individuell überschrieben
pressure_advance_smooth_time: 0.040
sensor_type: MAX31865
sensor_pin: can0:PA4
spi_bus: spi1
rtd_nominal_r: 1000
rtd_reference_r: 4300
rtd_num_of_wires: 2

[tmc2209 extruder]
uart_pin: can0:EXT_UART
interpolate: false
run_current: 0.6
hold_current: 0.2
sense_resistor: 0.110
stealthchop_threshold: 0

[cartographer]
mcu: cartographer
x_offset: 0 # This is the offset of your probe from the nozzle tip, to the centre of the coil.
y_offset: 20 #21.5 alter Wert Dragon Ace This is the offset of your probe from the nozzle tip, to the centre of the coil.
verbose: yes # For extra output

[adxl345]
cs_pin: can0:PB12
spi_bus: spi2_PB2_PB11_PB10